<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000"/>
  <!-- Subtle grid -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Logo mark -->
  <circle cx="600" cy="220" r="40" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
  <text x="600" y="234" font-family="Georgia, serif" font-size="48" font-style="italic" fill="#fff" text-anchor="middle">S</text>
  <!-- Headline -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="56" fill="#fff" text-anchor="middle" letter-spacing="-1">AI-Powered Design Studio</text>
  <!-- Sub -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">GO-TO-MARKET LANDING PAGES FOR STARTUPS</text>
  <!-- Bottom accent line -->
  <line x1="500" y1="440" x2="700" y2="440" stroke="#fff" stroke-width="1" opacity="0.15"/>
  <!-- Bottom text -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" text-anchor="middle">studio.design</text>
</svg>
