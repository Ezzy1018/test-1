<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test-1</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .repo-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #58a6ff;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .badge {
      display: inline-block;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 0.2rem 0.75rem;
      font-size: 0.8rem;
      color: #8b949e;
      margin: 0 auto 1.5rem;
      display: block;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 1.5rem 0;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 0.75rem;
    }

    .file-list {
      list-style: none;
    }

    .file-list li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .file-list li:hover {
      background: #21262d;
    }

    .file-list li span.icon {
      font-size: 1rem;
    }

    .file-list li span.name {
      color: #58a6ff;
      font-size: 0.95rem;
    }

    .readme-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-top: 0.5rem;
    }

    .readme-box h2 {
      font-size: 1.3rem;
      color: #e6edf3;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="repo-icon">📦</span>
    <h1>test-1</h1>
    <span class="badge">Ezzy1018 / test-1</span>

    <hr class="divider" />

    <p class="section-title">📁 Repository Contents</p>
    <ul class="file-list">
      <li>
        <span class="icon">📄</span>
        <span class="name">README.md</span>
      </li>
      <li>
        <span class="icon">🌐</span>
        <span class="name">index.html</span>
      </li>
    </ul>

    <hr class="divider" />

    <p class="section-title">📖 README</p>
    <div class="readme-box">
      <h2>test-1</h2>
    </div>
  </div>

  <footer>Preview generated for Ezzy1018/test-1</footer>
</body>
</html>
